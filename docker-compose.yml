services:
  api:
    build: .
    command: ["python", "main.py", "run-api"]
    ports:
      - "8000:8000"
    environment:
      DB_DSN: postgresql://postgres:postgres@postgres:5432/promt_hub
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promt_hub
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promt_hub"]
      interval: 2s
      timeout: 5s
      retries: 5
